<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just for You</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --pink-soft: #fce4ec;
            --pink-bold: #f06292;
            --pink-deep: #d81b60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--pink-soft);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            touch-action: manipulation; /* Mencegah double-tap zoom di HP */
            -webkit-user-select: none; /* Mencegah teks ke-highlight pas main game */
            user-select: none;
        }

        /* --- HALAMAN DEPAN --- */
        .container {
            text-align: center;
            animation: fadeIn 1.5s ease-in;
            padding: 20px;
            width: 100%;
        }

        /* Style Foto di Opening */
        .opening-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #ffffff;
            box-shadow: 0 10px 25px rgba(216, 129, 157, 0.3);
            margin-bottom: 20px;
            animation: popUp 0.8s ease;
        }

        .subjdl {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            color: #d8819d;
            margin-bottom: 10px;
        }

        .btn-main {
            background-color: #ffffff;
            color: var(--pink-bold);
            border: 2px solid var(--pink-bold);
            padding: 12px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-main:hover {
            background-color: var(--pink-bold);
            color: #ffffff;
            transform: scale(1.05);
        }

        /* --- AREA GAME TANGKAP HATI --- */
        #game-area {
            display: none;
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
        }

        .falling-heart {
            position: absolute;
            color: var(--pink-bold);
            font-size: 30px;
            cursor: pointer;
            animation: fall linear forwards;
            /* Tambahan area sentuh biar gampang di tap di HP */
            padding: 10px; 
        }

        @keyframes fall { to { transform: translateY(110vh); } }

        /* --- MODAL CARD ESTETIK --- */
        .glass-card {
            display: none;
            position: fixed;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(216, 129, 157, 0.2);
            text-align: center;
            width: 85%;
            max-width: 380px;
            z-index: 100;
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        #final-stage {
            display: none;
            text-align: center;
            z-index: 50;
            padding: 20px;
            width: 100%;
        }

        .choice-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-top: 20px;
        }

        #btn-happy {
            transition: all 0.3s ease;
            z-index: 999;
        }

        /* --- ANIMASI --- */
        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* =========================================
           RESPONSIVE MOBILE DESIGN 
           ========================================= */
        @media (max-width: 600px) {
            .subjdl {
                font-size: 40px; /* Ukuran font judul dikecilin buat HP */
            }
            
            .opening-img {
                width: 100px;
                height: 100px;
            }

            .glass-card {
                width: 90%;
                padding: 25px 20px; /* Kurangi padding biar konten gak terlalu sesak */
            }

            .card-img {
                height: 160px; /* Gambar dibuat sedikit lebih pendek */
            }

            .btn-main {
                padding: 10px 30px; /* Tombol sedikit disesuaikan ukurannya */
                font-size: 14px;
            }

            #final-card h2 {
                font-size: 32px !important;
            }

            .falling-heart {
                font-size: 35px; /* Hati dibesarin dikit biar gampang di-tap jari */
            }
        }
        
        @media (max-width: 380px) {
            .subjdl {
                font-size: 34px; /* Khusus HP yang layarnya kecil banget (misal iPhone SE) */
            }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="s.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="main-ui">
        <img src="sya.jpeg" alt="Syafa" class="opening-img">
        
        <h1 class="subjdl">Hi, Syafa!</h1>
        <p style="color: #8e717a; margin-bottom: 20px;">ahaha dia mampir, mau main sebentar ga?</p>
        <button class="btn-main" onclick="startGame()">Start!</button>
    </div>

    <div id="game-area">
        <div style="position:fixed; top:20px; width:100%; text-align:center; color:#d8819d; font-weight:700;">
            Catch 10 Hearts: <span id="score">0</span>
        </div>
    </div>

    <div id="reward-card" class="glass-card">
        <img src="syaa.jpeg" alt="Memories" class="card-img">
        <h2 style="font-family: 'Playfair Display'; color: #d8819d;">Keren Banget!</h2>
        <p style="color: #8e717a; font-size: 14px; margin: 15px 0;">
            ahaha, keren juga anak BR ini
        </p>
        <button class="btn-main" onclick="goToChoices()">Lanjut <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <div id="final-stage">
        <h2 class="subjdl" style="font-size: 32px;">Gimana seru ga?</h2>
        <p style="color: #8e717a;">yes or no?</p>
        <div class="choice-btns">
            <button id="btn-happy" class="btn-main" onclick="handleHappy()">seruu!</button>
            <button id="btn-sad" class="btn-main" style="border-color: #ccc; color: #999; font-size: 12px;" onclick="handleHappy()">gaa!</button>
        </div>
    </div>

    <div id="truth-stage" class="glass-card">
        <h2 style="font-family: 'Playfair Display'; color: #d8819d; font-size: 28px;">one question</h2>
        <p style="color: #8e717a; font-size: 14px; margin: 15px 0; line-height: 1.6;">
            lu cuma penasaran sama gw ya?
        </p>
        <div class="choice-btns">
            <button class="btn-main" onclick="handleTruth('suka')">gaa!</button>
            <button class="btn-main" style="border-color: #ccc; color: #999; font-size: 14px;" onclick="handleTruth('penasaran')">iyaa!</button>
        </div>
    </div>

    <div id="final-card" class="glass-card">
        <h2 style="font-family: 'Playfair Display'; color: #d8819d; font-size: 40px;">For You</h2>
        <p id="final-message" style="color: #8e717a; margin: 20px 0; line-height: 1.8;"></p>
        
        <div class="choice-btns">
            <a href="https://wa.me/6285711758009" target="_blank" class="btn-main" style="text-decoration: none; width: 100%; text-align: center;">chat gw! </a>
            <button class="btn-main" style="border-color: #ccc; color: #999; font-size: 14px; width: 100%;" onclick="location.reload()">Main Lagi</button>
        </div>
    </div>

    <script>
        let score = 0;
        let gameActive = false;
        let happyCount = 0;
        let btnSize = 1;

        function startGame() {
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Audio play failed, user interaction needed first."));

            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            gameActive = true;
            spawnHeart();
        }

        function spawnHeart() {
            if (!gameActive) return;
            const heart = document.createElement('i');
            heart.className = 'fa-solid fa-heart falling-heart';
            heart.style.left = Math.random() * (window.innerWidth - 50) + 10 + 'px'; // Sedikit penyesuaian biar gak nabrak pinggir layar HP
            const duration = Math.random() * 2 + 2;
            heart.style.animationDuration = duration + 's';
            heart.onclick = function() {
                score++;
                document.getElementById('score').innerText = score;
                this.remove();
                
                if (score >= 10) {
                    gameActive = false;
                    
                    const music = document.getElementById('bg-music');
                    music.pause();
                    music.currentTime = 0; 
                    
                    document.getElementById('game-area').style.display = 'none';
                    document.getElementById('reward-card').style.display = 'block';
                }
            };
            document.getElementById('game-area').appendChild(heart);
            setTimeout(() => { if(heart.parentElement) heart.remove(); }, duration * 1000);
            setTimeout(spawnHeart, 700);
        }

        function goToChoices() {
            document.getElementById('reward-card').style.display = 'none';
            document.getElementById('final-stage').style.display = 'block';
        }

        function handleHappy() {
            happyCount++;
            const happyBtn = document.getElementById('btn-happy');
            btnSize += 0.5;
            happyBtn.style.transform = `scale(${btnSize})`;
            
            if (happyCount >= 3) {
                document.getElementById('final-stage').style.display = 'none';
                document.getElementById('truth-stage').style.display = 'block';
            }
        }

        function handleTruth(choice) {
            document.getElementById('truth-stage').style.display = 'none';
            document.getElementById('final-card').style.display = 'block';
            const messageElement = document.getElementById('final-message');
            
            if (choice === 'suka') {
                messageElement.innerHTML = `
                    ahaha, let's see where this goes ya. <br>
                    semoga kedepannya kita makin seru! 
                `;
            } else {
                messageElement.innerHTML = `
                    Gimana kalau kita lanjut ngobrol biar lu makin kenal sama gw? 😉
                `;
            }
        }
    </script>
</body>
</html>
